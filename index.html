<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam AAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        .image-section {
            flex: 1;
            background: url('https://i.postimg.cc/FKmJ09T2/Back-IFP-AAS.jpg') no-repeat center center;
            background-size: cover;
        }

        .clock-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            position: relative;
        }

        /* BARIS ATAS (25%) - INSTRUKSI BERKEDIP */
        .row-top {
            flex: 0 0 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }

        .instruction {
            color: #d60000; 
            background: rgba(255, 255, 255, 0.95); 
            font-size: 1.8rem; 
            font-weight: 800;
            line-height: 1.2;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 5px solid #d60000;
            max-width: 95%;
            text-transform: uppercase;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.3; transform: scale(0.98); }
        }

        /* BARIS TENGAH (55%) - JAM & TANGGAL */
        .row-middle {
            flex: 0 0 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 2px solid rgba(255,255,255,0.2);
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        #clock {
            font-size: 9.5rem;
            letter-spacing: 5px;
            font-variant-numeric: tabular-nums;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        #date {
            font-size: 2.2rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* BARIS BAWAH (20%) - PESAN TERJADWAL */
        .row-bottom {
            flex: 0 0 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        #dynamic-msg {
            font-size: 1.6rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* TOMBOL TES SUARA */
        .test-audio-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
            z-index: 100;
        }

        .test-audio-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .image-section { height: 25vh; }
            .clock-section { height: 75vh; }
            #clock { font-size: 4rem; }
            .instruction { font-size: 1rem; }
            #date { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="image-section"></div>
    
    <div class="clock-section">
        <div class="row-top">
            <div class="instruction">
                Pastikan<br> Nama, Nomor Ujian, Mata Pelajaran <BR>dan TIPE SOAL untuk diisi (dihitamkan) <BR>dengan BENAR/SEMPURNA!
            </div>
        </div>

        <div class="row-middle">
            <div id="clock">00:00:00</div>
            <div id="date">Memuat Tanggal...</div>
        </div>

        <div class="row-bottom">
            <div id="dynamic-msg">PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA</div>
        </div>

        <button class="test-audio-btn" onclick="berikanSuara('Sinkronisasi Sistem, berhasil')">
            🔈 TES AUDIO
        </button>
    </div>

    <script>
        // FUNGSI SUARA (Text-to-Speech)
        function berikanSuara(teks) {
            // Batalkan suara yang sedang berjalan agar tidak tumpang tindih
            window.speechSynthesis.cancel();
            
            const pesan = new SpeechSynthesisUtterance(teks);
            pesan.lang = 'id-ID';
            pesan.rate = 0.9; 
            pesan.pitch = 1;
            window.speechSynthesis.speak(pesan);
        }

        function tampilkanAlert(teks, pakeSuara) {
            const target = document.getElementById('dynamic-msg');
            target.textContent = teks;
            target.style.color = "#ffffff"; 
            
            if (pakeSuara) {
                berikanSuara(teks);
            }
        }

        function updateTime() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            
            // Tampilan Jam
            const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            document.getElementById('clock').textContent = timeStr;

            // Tampilan Tanggal
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options);

            // --- LOGIKA JADWAL SESUAI PERMINTAAN ---
                   
            // SESI PAGI (08:45 - 09:00)
            if (h === 6 && m === 58 && s === 0) {
                tampilkanAlert("ASESMEN AKHIR SEKOLAH SESI 1, AKAN SEGERA DIMULAI!", true);
            }
            else if (h === 8 && m === 45 && s === 0) {
                tampilkanAlert("SISA WAKTU 15 MENIT LAGI", true);
            }
            else if (h === 8 && m === 55 && s === 0) {
                tampilkanAlert("SISA WAKTU 5 MENIT! CEK KEMBALI JAWABAN KAMU!", true);
            }
            else if (h === 9 && m === 0 && s === 0) {
                tampilkanAlert("WAKTU ASESMEN AKHIR SEKOLAH SESI 1, TELAH HABIS!", true);
            }
            // SESI SIANG (11:45 - 12:00)
            else if (h === 09 && m === 58 && s === 0) {
                tampilkanAlert("ASESMEN AKHIR SEKOLAH SESI 2, AKAN SEGERA DIMULAI!", true);
            }
            else if (h === 11 && m === 45 && s === 0) {
                tampilkanAlert("SISA WAKTU 15 MENIT LAGI, SEMANGAT!", true);
            }
            else if (h === 11 && m === 55 && s === 0) {
                tampilkanAlert("SISA WAKTU 5 MENIT! CEK KEMBALI JAWABAN KAMU!", true);
            }
            else if (h === 12 && m === 0 && s === 0) {
                tampilkanAlert("WAKTU ASESMEN AKHIR SEKOLAH SESI 2, TELAH HABIS!", true);
            }
        }

        // Jalankan update setiap detik
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
