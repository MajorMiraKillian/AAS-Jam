<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam AAS - Hybrid Language</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; height: 100vh; font-family: 'Montserrat', sans-serif; overflow: hidden; background-color: #000; }
        .image-section { flex: 1; background: url('https://i.postimg.cc/xTc588T0/Back_IFP_AAS.jpg') no-repeat center center; background-size: cover; }
        .clock-section { flex: 1; display: flex; flex-direction: column; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; position: relative; }
        
        .row-top { flex: 0 0 25%; display: flex; align-items: center; justify-content: center; padding: 15px; text-align: center; }
        .instruction { color: #d60000; background: rgba(255, 255, 255, 0.95); font-size: 1.6rem; font-weight: 800; line-height: 1.3; padding: 20px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 5px solid #d60000; max-width: 95%; text-transform: uppercase; animation: blinker 1.5s linear infinite; }
        
        @keyframes blinker { 50% { opacity: 0.3; transform: scale(0.98); } }
        
        .row-middle { flex: 0 0 55%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-top: 2px solid rgba(255,255,255,0.2); border-bottom: 2px solid rgba(255,255,255,0.2); }
        #clock { font-size: 9.5rem; letter-spacing: 5px; font-variant-numeric: tabular-nums; text-shadow: 2px 4px 10px rgba(0,0,0,0.3); }
        #date { font-size: 2.2rem; font-weight: 300; opacity: 0.9; }
        
        .row-bottom { flex: 0 0 20%; display: flex; align-items: center; justify-content: center; padding: 0 20px; }
        #dynamic-msg { font-size: 1.5rem; letter-spacing: 2px; font-weight: 800; color: #ffffff; text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,0.5); text-transform: uppercase; }
        
        .test-audio-btn { position: absolute; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; font-weight: bold; z-index: 100; transition: 0.3s; }
        .test-audio-btn:hover { background: rgba(255, 255, 255, 0.4); }

        @media (max-width: 768px) { #clock { font-size: 4rem; } .instruction { font-size: 1rem; } #dynamic-msg { font-size: 1.2rem; } }
    </style>
</head>
<body>

    <div class="image-section"></div>
    <div class="clock-section">
        <div class="row-top">
            <div class="instruction">
                Pastikan<br> Nama, Nomor Ujian, Mata Pelajaran <BR>dan TIPE SOAL untuk diisi (dihitamkan) <BR>dengan BENAR/SEMPURNA!
            </div>
        </div>
        <div class="row-middle">
            <div id="clock">00:00:00</div>
            <div id="date">Memuat Tanggal...</div>
        </div>
        <div class="row-bottom">
            <div id="dynamic-msg">PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA</div>
        </div>
        <button class="test-audio-btn" onclick="testAudio()">
            🔈 TES AUDIO
        </button>
    </div>

    <script>
        const SLOGAN_ID = "PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA";
        const SLOGAN_EN = "ACHIEVEMENT IS IMPORTANT, HONESTY IS THE PRIORITY";
        let pengumumanAktif = false;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playChime() {
            initAudio();
            const notes = [329.63, 392.00, 523.25, 659.25]; 
            const startTime = audioCtx.currentTime;
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime + i * 0.5);
                gain.gain.setValueAtTime(0, startTime + i * 0.5);
                gain.gain.linearRampToValueAtTime(0.2, startTime + i * 0.5 + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + i * 0.5 + 1.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime + i * 0.5);
                osc.stop(startTime + i * 0.5 + 1.5);
            });
        }

        function jalankanPengumuman(teksSuara, teksLayar, langCode) {
            window.speechSynthesis.cancel();
            document.getElementById('dynamic-msg').textContent = teksLayar;
            pengumumanAktif = true;
            playChime();

            setTimeout(() => {
                const pesan = new SpeechSynthesisUtterance(teksSuara);
                const voices = window.speechSynthesis.getVoices();
                
                // Cari suara perempuan yang natural
                const femaleVoice = voices.find(v => 
                    v.lang.includes(langCode) && 
                    (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('xiaoxiao') || v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('gadis'))
                );

                pesan.voice = femaleVoice || voices.find(v => v.lang.includes(langCode));
                pesan.lang = langCode;
                pesan.rate = 0.85;  
                pesan.pitch = 1.0; 
                window.speechSynthesis.speak(pesan);

                setTimeout(() => {
                    pengumumanAktif = false;
                    updateMessageDisplay(); 
                }, 60000);
            }, 2500);
        }

        function testAudio() {
            // Test menggunakan suara Indo (Sesi 2 style)
            jalankanPengumuman("Sistem audio berfungsi dengan baik", "SISTEM AUDIO BERFUNGSI DENGAN BAIK", "id-ID");
        }

        function updateMessageDisplay() {
            if (pengumumanAktif) return;
            const now = new Date();
            const h = now.getHours();
            const target = document.getElementById('dynamic-msg');
            
            // Jika jam 7-9 (Sesi 1), gunakan slogan Inggris
            if (h >= 7 && h < 9) {
                target.textContent = SLOGAN_EN;
            } else if (h >= 9 && h < 10) {
                target.textContent = "SESI SATU TELAH SELESAI";
            } else {
                target.textContent = SLOGAN_ID;
            }
        }

        function updateTime() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            document.getElementById('clock').textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            document.getElementById('date').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            if (s === 0) {
                // --- SESI 1: Suara Mandarin (zh-CN), Teks Inggris ---
                if (h === 6 && m === 57) 
                    jalankanPengumuman("请注意，第一场校终评估即将开始。", "ATTENTION, FINAL SCHOOL ASSESSMENT SESSION 1 IS ABOUT TO BEGIN!", "zh-CN");
                else if (h === 7 && m === 00) 
                    jalankanPengumuman("成绩固然重要，诚信才是根本。", "ACHIEVEMENT IS IMPORTANT, HONESTY IS THE PRIORITY", "zh-CN");
                else if (h === 8 && m === 45) 
                    jalankanPengumuman("请注意，答题时间还剩十五分钟。", "ATTENTION, YOU HAVE 15 MINUTES REMAINING.", "zh-CN");
                else if (h === 8 && m === 55) 
                    jalankanPengumuman("请注意，答题时间还剩五分钟。请检查您的答案。", "ATTENTION, 5 MINUTES LEFT. PLEASE CHECK YOUR ANSWERS.", "zh-CN");
                else if (h === 9 && m === 00) 
                    jalankanPengumuman("请注意，第一场校终评估答题时间已到。", "SESSION 1 ASSESSMENT TIME IS OVER.", "zh-CN");

                // --- SESI 2: Suara Indonesia (id-ID), Teks Indonesia ---
                else if (h === 9 && m === 57) 
                    jalankanPengumuman("Mohon perhatian, asesmen akhir sekolah sesi dua akan segera dimulai.", "ASESMEN AKHIR SEKOLAH SESI 2 AKAN SEGERA DIMULAI!", "id-ID");
                else if (h === 10 && m === 00) 
                    jalankanPengumuman("Prestasi itu penting, jujur yang paling utama.", "PRESTASI ITU PENTING, JUJUR YANG PALING UTAMA", "id-ID");
                else if (h === 11 && m === 45) 
                    jalankanPengumuman("Mohon perhatian, waktu mengerjakan tersisa lima belas menit.", "WAKTU MENGERJAKAN TERSISA 15 MENIT.", "id-ID");
                else if (h === 11 && m === 55) 
                    jalankanPengumuman("Mohon perhatian, waktu tersisa lima menit. Silakan periksa kembali jawaban Anda.", "WAKTU TERSISA 5 MENIT. PERIKSA KEMBALI JAWABAN ANDA!", "id-ID");
                else if (h === 12 && m === 00) 
                    jalankanPengumuman("Mohon perhatian, waktu asesmen akhir sekolah sesi dua telah habis.", "WAKTU ASESMEN AKHIR SEKOLAH SESI 2 TELAH HABIS!", "id-ID");
            }
            if (!pengumumanAktif) updateMessageDisplay();
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
